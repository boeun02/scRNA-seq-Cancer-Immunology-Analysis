# mac version
name: spatial

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python=3.10

  # core scientific stack
  - numpy
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - scikit-learn
  - scikit-image
  - statsmodels
  - numba
  - h5py
  - tqdm

  # single-cell ecosystem
  - scanpy
  - anndata
  - umap-learn
  - leidenalg
  - python-igraph
  - pynndescent
  - harmonypy
  - session-info2

  # optional
  - pip
 
  # pip only if needed
  - pip:
      - scikit-misc 